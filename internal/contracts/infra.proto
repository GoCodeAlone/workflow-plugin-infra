syntax = "proto3";

package workflow.plugins.infra.v1;

import "google/protobuf/struct.proto";

option go_package = "github.com/GoCodeAlone/workflow-plugin-infra/internal/contracts;contracts";

message InfraResourceConfig {
  string provider = 1;
  string region = 2;
  string workspace = 3;
  map<string, string> labels = 4;
  google.protobuf.Struct settings = 5;
}

message ContainerServiceConfig {
  string provider = 1;
  string region = 2;
  string workspace = 3;
  string image = 4;
  repeated int32 ports = 5;
  map<string, string> env = 6;
  int32 replicas = 7;
  map<string, string> labels = 8;
  google.protobuf.Struct settings = 9;
}

message K8SClusterConfig {
  string provider = 1;
  string region = 2;
  string workspace = 3;
  string version = 4;
  int32 node_count = 5;
  string node_size = 6;
  map<string, string> labels = 7;
  google.protobuf.Struct settings = 8;
}

message DatabaseConfig {
  string provider = 1;
  string region = 2;
  string workspace = 3;
  string engine = 4;
  string version = 5;
  string size = 6;
  int32 storage_gb = 7;
  bool multi_az = 8;
  map<string, string> labels = 9;
  google.protobuf.Struct settings = 10;
}

message CacheConfig {
  string provider = 1;
  string region = 2;
  string workspace = 3;
  string engine = 4;
  string version = 5;
  string size = 6;
  int32 nodes = 7;
  map<string, string> labels = 8;
  google.protobuf.Struct settings = 9;
}

message VPCConfig {
  string provider = 1;
  string region = 2;
  string workspace = 3;
  string cidr = 4;
  repeated string availability_zones = 5;
  map<string, string> labels = 6;
  google.protobuf.Struct settings = 7;
}

message LoadBalancerConfig {
  string provider = 1;
  string region = 2;
  string workspace = 3;
  string scheme = 4;
  repeated int32 ports = 5;
  map<string, string> labels = 6;
  google.protobuf.Struct settings = 7;
}

message DNSConfig {
  string provider = 1;
  string region = 2;
  string workspace = 3;
  string zone = 4;
  string record = 5;
  string target = 6;
  map<string, string> labels = 7;
  google.protobuf.Struct settings = 8;
}

message RegistryConfig {
  string provider = 1;
  string region = 2;
  string workspace = 3;
  string name = 4;
  bool public = 5;
  map<string, string> labels = 6;
  google.protobuf.Struct settings = 7;
}

message APIGatewayConfig {
  string provider = 1;
  string region = 2;
  string workspace = 3;
  string protocol = 4;
  repeated string routes = 5;
  map<string, string> labels = 6;
  google.protobuf.Struct settings = 7;
}

message FirewallConfig {
  string provider = 1;
  string region = 2;
  string workspace = 3;
  repeated string ingress = 4;
  repeated string egress = 5;
  map<string, string> labels = 6;
  google.protobuf.Struct settings = 7;
}

message IAMRoleConfig {
  string provider = 1;
  string region = 2;
  string workspace = 3;
  string name = 4;
  repeated string policies = 5;
  map<string, string> labels = 6;
  google.protobuf.Struct settings = 7;
}

message StorageConfig {
  string provider = 1;
  string region = 2;
  string workspace = 3;
  string name = 4;
  string class = 5;
  bool versioning = 6;
  map<string, string> labels = 7;
  google.protobuf.Struct settings = 8;
}

message CertificateConfig {
  string provider = 1;
  string region = 2;
  string workspace = 3;
  string domain = 4;
  repeated string subject_alt_names = 5;
  map<string, string> labels = 6;
  google.protobuf.Struct settings = 7;
}
